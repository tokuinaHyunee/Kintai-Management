# ===== 데이터소스 설정 =====
spring.datasource.url=jdbc:mysql://localhost:3306/kintai_db?useSSL=false&serverTimezone=Asia/Tokyo&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=tkdgus12!@
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA 설정 =====
spring.jpa.hibernate.ddl-auto=update
